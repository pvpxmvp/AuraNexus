name: Build AuraNexus APK
on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK r26b
        run: |
          sdkmanager "ndk;26.1.10909125" --no_https
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-deps-v2-${{ hashFiles('**/Cargo.lock', '**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-deps-v2-

      - name: Install cargo-ndk
        run: |
          if ! command -v cargo-ndk &> /dev/null; then
            cargo install cargo-ndk
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew :android-app:assembleDebug

      - name: Debug Build Outputs
        run: |
          echo "=== Listing android-app directory ==="
          ls -R android-app/ || true
          
          echo "=== Checking build outputs ==="
          if [ -d "android-app/build/outputs" ]; then
            find android-app/build/outputs -type f
          else
            echo "ERROR: android-app/build/outputs directory does not exist!"
            echo "Available directories in android-app/build:"
            ls android-app/build/ || true
          fi

      - name: Find APK anywhere
        run: |
          APK_PATH=$(find . -name "*.apk" -type f 2>/dev/null | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::No APK file found anywhere in the repository!"
            exit 1
          fi
          echo "Found APK at: $APK_PATH"
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-nexus-debug-apk
          path: ${{ env.APK_PATH }}
          retention-days: 7
          if-no-files-found: error
